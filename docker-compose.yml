services:
  mysql:
    image: mysql:8.0
    container_name: inventech_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: inventech
      MYSQL_USER: inventech_user
      MYSQL_PASSWORD: inventech_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./backend/database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql

volumes:
  mysql_data:
