<aside class="w-60 h-[calc(100vh-4rem)] bg-surface border-r border-slate-200 fixed top-16 left-0 z-20 flex flex-col">
  <nav class="flex-1 px-3 py-4 space-y-1">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-primary-50 text-primary-700 font-semibold"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-slate-600 hover:bg-slate-100 transition cursor-pointer"
      >
        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.icon" />
        </svg>
        {{ item.label }}
      </a>
    }
  </nav>
</aside>
