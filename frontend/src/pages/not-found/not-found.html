<div class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
  <div class="bg-surface rounded-2xl shadow-lg p-10 max-w-md w-full text-center space-y-6">

    <!-- Icono -->
    <div class="w-20 h-20 bg-slate-100 rounded-full flex items-center justify-center mx-auto shadow-inner">
      <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
          d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      </svg>
    </div>

    <!-- Código de error — interpolación -->
    <div>
      <p class="text-7xl font-extrabold text-primary-700">404</p>
      <h1 class="text-xl font-semibold text-slate-800 mt-2">Página no encontrada</h1>
      <p class="text-sm text-slate-500 mt-2">
        La ruta que buscas no existe o fue movida. Verifica la URL o regresa al inicio.
      </p>
    </div>

    <!-- Acciones -->
    <div class="flex flex-col sm:flex-row gap-3 justify-center">

      <!-- routerLink declarativo — property binding -->
      <a
        routerLink="/dashboard"
        class="bg-primary-600 hover:bg-primary-700 text-white text-sm font-medium px-5 py-2.5 rounded-lg transition-colors cursor-pointer inline-block text-center">
        Ir al Dashboard
      </a>

      <!-- Navegación programática — event binding -->
      <button
        (click)="goToInventory()"
        class="border border-slate-300 text-slate-600 hover:bg-slate-100 text-sm font-medium px-5 py-2.5 rounded-lg transition-colors cursor-pointer">
        Ver Inventario
      </button>

    </div>

  </div>
</div>
