<div class="p-6 space-y-6">
	<div>
		<h1 class="text-2xl font-bold text-slate-800">Inventario</h1>
		<p class="text-sm text-slate-500 mt-1">
			Selecciona la accion que quieres realizar sobre productos.
		</p>
	</div>

	<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
		<div class="bg-surface rounded-xl shadow p-5 space-y-4">
			<h2 class="text-lg font-semibold text-slate-700">Nuevo Producto</h2>
			<p class="text-sm text-slate-500">
				Crea un producto con los campos del inventario.
			</p>

			<a
				routerLink="/inventory/new"
				class="inline-flex items-center justify-center text-sm font-medium px-4 py-2 rounded-lg bg-primary-600 hover:bg-primary-700 text-white transition-colors">
				Ir a formulario de alta
			</a>
		</div>

		<div class="bg-surface rounded-xl shadow p-5 space-y-4">
			<h2 class="text-lg font-semibold text-slate-700">Editar Producto</h2>
			<p class="text-sm text-slate-500">
				Ingresa el ID del producto para abrir su formulario de edicion.
			</p>

			<div class="space-y-2">
				<label class="block text-sm font-medium text-slate-700">ID de producto</label>
				<input
					type="number"
					min="1"
					[value]="editProductId()"
					(input)="setEditProductId(($any($event.target)).value)"
					placeholder="Ej: 1"
					class="w-full border border-slate-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-primary-400" />
			</div>

			@if (editError()) {
				<p class="text-danger-500 text-xs">{{ editError() }}</p>
			}

			<button
				type="button"
				(click)="goToEditForm()"
				class="inline-flex items-center justify-center text-sm font-medium px-4 py-2 rounded-lg bg-primary-600 hover:bg-primary-700 text-white transition-colors cursor-pointer">
				Ir a formulario de edicion
			</button>
		</div>
	</div>
</div>
